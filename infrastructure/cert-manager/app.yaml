apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://github.com/LrsWnd/gitops.git
      targetRevision: init
      path: infrastructure/cert-manager
      valueFiles:
          - $values/infrastructure/cert-manager/values.yaml
    - repoURL: https://github.com/LrsWnd/gitops.git
      targetRevision: init
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true