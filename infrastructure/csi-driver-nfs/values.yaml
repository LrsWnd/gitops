storageClasses:
  - name: nfs
    annotations:
      storageclass.kubernetes.io/is-default-class: "true"
    parameters:
      server: 192.168.0.25
      share: /mnt/user/cluster
      subDir: ${pvc.metadata.namespace}-${pv.metadata.name}
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    mountOptions:
      - nfsvers=4.1
      - nolock
