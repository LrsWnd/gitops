apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: trivy
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://aquasecurity.github.io/helm-charts/
      chart: trivy
      targetRevision: 0.22.0
      helm:
        releaseName: trivy
        valueFiles:
          - $values/infrastructure/trivy/values.yaml
    - repoURL: https://github.com/LrsWnd/gitops.git
      targetRevision: init
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true