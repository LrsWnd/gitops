apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://192.168.0.25:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-token-secret
          key: token
          namespace: external-secrets