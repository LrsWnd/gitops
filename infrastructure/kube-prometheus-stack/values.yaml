crds:
  enabled: true

grafana:
  enabled: true

  replicas: 1

  adminPassword: admin

  ingress:
    enabled: false

  persistence:
    enabled: false

  sidecar:
    dashboards:
      enabled: true

    datasources:
      enabled: true

prometheus:
  ingress:
    enabled: false

  prometheusSpec:
    replicas: 1

    retention: 3d

    retentionSize: 5GB

    walCompression: true

    scrapeInterval: 60s

    evaluationInterval: 60s

    enableAdminAPI: false

    resources:
      requests:
        cpu: 100m
        memory: 512Mi

      limits:
        memory: 1Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn

          accessModes:
            - ReadWriteOnce

          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: true

  alertmanagerSpec:
    replicas: 1

    retention: 24h

    resources:
      requests:
        cpu: 50m
        memory: 128Mi

      limits:
        memory: 256Mi

kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

coreDns:
  enabled: true

kubeProxy:
  enabled: false

defaultRules:
  create: true

  rules:
    etcd: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeControllerManager: false

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

    limits:
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

    limits:
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi

    limits:
      memory: 100Mi
