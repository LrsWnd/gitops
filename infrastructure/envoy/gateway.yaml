apiVersion: gateway.networking.k8s.io/v1
kind: Gateway

metadata:
  name: shared-gateway
  namespace: envoy-gateway-system
  annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  gatewayClassName: envoy-gateway-class

  listeners:
    - name: http
      protocol: HTTP
      port: 80

      allowedRoutes:
        namespaces:
          from: All

    - name: https
      protocol: HTTPS
      port: 443

      hostname: "*.larswenda.org"

      tls:
        mode: Terminate

        certificateRefs:
          - name: wildcard-larswenda-org-tls

      allowedRoutes:
        namespaces:
          from: All