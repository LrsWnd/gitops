apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.5.15
    releaseName: argocd
    namespace: argocd
    valuesInline:
      server:
        ingress:
          enabled: false

resources:
  - ingress.yaml