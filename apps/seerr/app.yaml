apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/seerr-team/seerr/seerr-chart
      path: .
      targetRevision: 3.0.0
      helm:
        releaseName: seerr
        valueFiles:
          - $values/apps/seerr/values.yaml
    - repoURL: https://github.com/LrsWnd/gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true