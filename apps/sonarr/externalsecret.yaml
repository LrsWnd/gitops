apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-api-token
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sonarr-api-token
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: secret/data/sonarr
        property: API_KEY